<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA - Non-Emergency Consultation</title>
    <!-- Amazon Cognito Identity SDK (load BEFORE other CDNs so its UMD bundle attaches the window global) -->
    <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.12/dist/amazon-cognito-identity.min.js"></script>
    <!-- Shared Cognito auth + authenticated API helper -->
    <script src="auth.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        aria: {
                            blue: '#2563EB',
                            dark: '#1E40AF',
                            light: '#EFF6FF',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .message-enter { animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .mic-btn.recording { animation: pulse-ring 1.5s infinite; }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(37, 99, 235, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-gray-100 sticky top-0 z-10">
        <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 text-gray-500 hover:text-gray-900">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
                <span class="text-sm font-medium">Back</span>
            </a>
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-aria-blue rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z" />
                    </svg>
                </div>
                <span class="font-bold text-gray-900">Consultation</span>
            </div>
            <div class="w-16"></div>
        </div>
    </header>

    <!-- Main -->
    <main class="flex-1 flex flex-col max-w-lg mx-auto w-full px-4 py-6">

        <!-- Mode Selection (shown initially) -->
        <div id="modeSelection" class="flex-1 flex flex-col">
            <div class="text-center mb-8">
                <h2 class="text-xl font-bold text-gray-900 mb-2">How would you like to communicate?</h2>
                <p class="text-sm text-gray-500">Choose the option that works best for you</p>
            </div>

            <div class="space-y-4">
                <!-- Voice Option -->
                <button onclick="selectMode('voice')" class="card-hover w-full bg-white rounded-xl border-2 border-gray-100 p-6 flex items-center gap-4 text-left hover:border-aria-blue">
                    <div class="w-14 h-14 bg-blue-50 rounded-full flex items-center justify-center flex-shrink-0">
                        <svg class="w-7 h-7 text-aria-blue" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" />
                        </svg>
                    </div>
                    <div>
                        <h3 class="font-semibold text-gray-900">Voice</h3>
                        <p class="text-sm text-gray-500">Speak to ARIA in your language</p>
                    </div>
                </button>

                <!-- Text Chat Option -->
                <button onclick="selectMode('text')" class="card-hover w-full bg-white rounded-xl border-2 border-gray-100 p-6 flex items-center gap-4 text-left hover:border-aria-blue">
                    <div class="w-14 h-14 bg-blue-50 rounded-full flex items-center justify-center flex-shrink-0">
                        <svg class="w-7 h-7 text-aria-blue" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 01.865-.501 48.172 48.172 0 003.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0012 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018z" />
                        </svg>
                    </div>
                    <div>
                        <h3 class="font-semibold text-gray-900">Text Chat</h3>
                        <p class="text-sm text-gray-500">Type your symptoms or concerns</p>
                    </div>
                </button>

                <!-- Image Upload Option -->
                <button onclick="selectMode('image')" class="card-hover w-full bg-white rounded-xl border-2 border-gray-100 p-6 flex items-center gap-4 text-left hover:border-aria-blue">
                    <div class="w-14 h-14 bg-blue-50 rounded-full flex items-center justify-center flex-shrink-0">
                        <svg class="w-7 h-7 text-aria-blue" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z" />
                        </svg>
                    </div>
                    <div>
                        <h3 class="font-semibold text-gray-900">Upload Image</h3>
                        <p class="text-sm text-gray-500">Take a photo of a wound, rash, or condition</p>
                    </div>
                </button>
            </div>
        </div>

        <!-- Chat Interface (hidden initially, shown after mode selection) -->
        <div id="chatInterface" class="flex-1 flex flex-col hidden">
            
            <!-- Status -->
            <div class="bg-blue-50 border border-blue-100 rounded-xl p-3 mb-4 text-center">
                <p class="text-sm text-aria-blue font-medium" id="chatStatus">Describe your symptoms or concern</p>
            </div>

            <!-- Messages -->
            <div id="chatMessages" class="flex-1 space-y-3 overflow-y-auto mb-4 min-h-[250px]">
                <!-- ARIA welcome message -->
                <div class="flex justify-start message-enter">
                    <div class="bg-white border border-gray-200 rounded-2xl rounded-bl-md px-4 py-3 max-w-[80%] shadow-sm">
                        <p class="text-xs font-medium text-aria-blue mb-1">ARIA</p>
                        <p class="text-sm text-gray-900" id="welcomeMessage">Hello! I'm ARIA. Tell me what's bothering you and I'll help guide you.</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div id="inputArea" class="space-y-3 pb-4">
                
                <!-- Voice input -->
                <div id="voiceInput" class="flex flex-col items-center gap-2 hidden">
                    <button class="mic-btn w-20 h-20 rounded-full bg-aria-blue flex items-center justify-center shadow-lg hover:bg-aria-dark active:scale-95 focus:outline-none focus:ring-4 focus:ring-blue-200"
                            id="chatMicBtn" aria-label="Hold to speak">
                        <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                    </button>
                    <p class="text-xs text-gray-500">Hold to speak</p>
                </div>

                <!-- Text input -->
                <div id="textInput" class="flex gap-2 hidden">
                    <input type="text" 
                           id="chatTextInput"
                           class="flex-1 px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-aria-blue focus:border-transparent"
                           placeholder="Type your symptoms..."
                           aria-label="Type your message">
                    <button id="chatSendBtn"
                            class="px-4 py-3 bg-aria-blue text-white rounded-xl text-sm font-medium hover:bg-aria-dark active:scale-95">
                        Send
                    </button>
                </div>

                <!-- Image upload -->
                <div id="imageInput" class="hidden">
                    <label class="block w-full cursor-pointer">
                        <div class="border-2 border-dashed border-gray-200 rounded-xl p-8 text-center hover:border-aria-blue hover:bg-blue-50 transition-colors">
                            <svg class="w-10 h-10 text-gray-400 mx-auto mb-3" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
                            </svg>
                            <p class="text-sm font-medium text-gray-700">Tap to take a photo or choose from gallery</p>
                            <p class="text-xs text-gray-500 mt-1">Supports: wound, rash, burn, skin condition</p>
                        </div>
                        <input type="file" id="imageFile" accept="image/*" capture="environment" class="hidden" onchange="handleImageUpload(event)">
                    </label>
                    <!-- Image preview -->
                    <div id="imagePreview" class="hidden mt-4">
                        <div class="relative inline-block">
                            <img id="previewImg" class="rounded-xl max-h-48 border border-gray-200" alt="Uploaded image">
                            <button onclick="clearImage()" class="absolute -top-2 -right-2 w-6 h-6 bg-red-500 text-white rounded-full text-xs flex items-center justify-center">X</button>
                        </div>
                        <button onclick="analyzeImage()" class="mt-3 w-full py-3 bg-aria-blue text-white rounded-xl text-sm font-medium hover:bg-aria-dark">
                            Analyze Image
                        </button>
                    </div>
                </div>

                <!-- Mode switcher -->
                <div class="flex justify-center gap-4 pt-2">
                    <button onclick="switchInput('voice')" id="switchVoice" class="text-xs text-gray-400 hover:text-aria-blue flex items-center gap-1">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" />
                        </svg>
                        Voice
                    </button>
                    <button onclick="switchInput('text')" id="switchText" class="text-xs text-gray-400 hover:text-aria-blue flex items-center gap-1">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 01.865-.501 48.172 48.172 0 003.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0012 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018z" />
                        </svg>
                        Text
                    </button>
                    <button onclick="switchInput('image')" id="switchImage" class="text-xs text-gray-400 hover:text-aria-blue flex items-center gap-1">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z" />
                        </svg>
                        Image
                    </button>
                </div>
            </div>
        </div>

    </main>

    <script>
        // ============================================================
        // ARIA Non-Emergency Consultation — live backend integration
        // ============================================================
        // Auth + API config/helpers (ARIA_CONFIG, userPool, signIn, getIdToken,
        // authedPost, signOut, redirectToLogin) come from auth.js, loaded above.

        // === STATE ===
        let currentMode = null;
        let sessionId = null;        // single conversation shared across all input modes
        let patientCoords = null;    // { lat, lng } once geolocation succeeds, else null
        let isProcessing = false;    // guards against concurrent turns
        let uploadedImage = null;

        // === GEOLOCATION (for nearest-clinic routing) ===
        function requestLocation() {
            if (!('geolocation' in navigator)) { patientCoords = null; return; }
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude, lng = pos.coords.longitude;
                    patientCoords = (typeof lat === 'number' && typeof lng === 'number') ? { lat, lng } : null;
                },
                () => { patientCoords = null; }
            );
        }

        function startConsultation() {
            requestLocation();
        }

        // Merge session + location into a /chat call and capture a new session_id.
        async function chatPost(extra) {
            const body = Object.assign({}, extra);
            if (sessionId) body.session_id = sessionId;
            if (patientCoords) { body.lat = patientCoords.lat; body.lng = patientCoords.lng; }
            const data = await authedPost('/chat', body);
            if (data && data.session_id && !sessionId) {
                sessionId = data.session_id;
                if (!sessionId) throw new Error('Could not save the conversation session. Please try again.');
            }
            return data;
        }

        // === MODE SELECTION ===
        function selectMode(mode) {
            currentMode = mode;
            document.getElementById('modeSelection').classList.add('hidden');
            document.getElementById('chatInterface').classList.remove('hidden');
            switchInput(mode);

            const welcomeMsg = document.getElementById('welcomeMessage');
            if (mode === 'voice') {
                welcomeMsg.textContent = "I'm listening. Hold the mic button and tell me what's wrong.";
            } else if (mode === 'text') {
                welcomeMsg.textContent = "Hello! Type your symptoms or describe what's bothering you.";
            } else if (mode === 'image') {
                welcomeMsg.textContent = "Upload a photo of the affected area. I'll analyze it and ask follow-up questions.";
            }
        }

        function switchInput(mode) {
            currentMode = mode;
            document.getElementById('voiceInput').classList.add('hidden');
            document.getElementById('textInput').classList.add('hidden');
            document.getElementById('imageInput').classList.add('hidden');

            document.getElementById('switchVoice').classList.remove('text-aria-blue', 'font-medium');
            document.getElementById('switchText').classList.remove('text-aria-blue', 'font-medium');
            document.getElementById('switchImage').classList.remove('text-aria-blue', 'font-medium');

            if (mode === 'voice') {
                document.getElementById('voiceInput').classList.remove('hidden');
                document.getElementById('switchVoice').classList.add('text-aria-blue', 'font-medium');
            } else if (mode === 'text') {
                document.getElementById('textInput').classList.remove('hidden');
                document.getElementById('switchText').classList.add('text-aria-blue', 'font-medium');
            } else if (mode === 'image') {
                document.getElementById('imageInput').classList.remove('hidden');
                document.getElementById('switchImage').classList.add('text-aria-blue', 'font-medium');
            }
        }

        // === UI RENDERING (DOM-built; user/AI text set via textContent to avoid injection) ===
        function messagesEl() { return document.getElementById('chatMessages'); }
        function scrollMessages() { const m = messagesEl(); m.scrollTop = m.scrollHeight; }
        function setStatus(text) { document.getElementById('chatStatus').textContent = text; }

        function addChatMessage(sender, text) {
            const wrap = document.createElement('div');
            wrap.className = 'flex message-enter ' + (sender === 'patient' ? 'justify-end' : 'justify-start');
            const bubble = document.createElement('div');
            if (sender === 'patient') {
                bubble.className = 'bg-aria-blue text-white rounded-2xl rounded-br-md px-4 py-3 max-w-[80%]';
                const p = document.createElement('p'); p.className = 'text-sm'; p.textContent = text;
                bubble.appendChild(p);
            } else {
                bubble.className = 'bg-white border border-gray-200 rounded-2xl rounded-bl-md px-4 py-3 max-w-[80%] shadow-sm';
                const label = document.createElement('p'); label.className = 'text-xs font-medium text-aria-blue mb-1'; label.textContent = 'ARIA';
                const p = document.createElement('p'); p.className = 'text-sm text-gray-900'; p.textContent = text;
                bubble.appendChild(label); bubble.appendChild(p);
            }
            wrap.appendChild(bubble);
            messagesEl().appendChild(wrap);
            scrollMessages();
        }

        function addImageMessage(src) {
            const wrap = document.createElement('div');
            wrap.className = 'flex justify-end message-enter';
            const bubble = document.createElement('div');
            bubble.className = 'bg-aria-blue rounded-2xl rounded-br-md px-4 py-3 max-w-[80%]';
            const img = document.createElement('img');
            img.src = src; img.className = 'rounded-lg max-h-32 mb-2'; img.alt = 'Patient upload';
            const p = document.createElement('p'); p.className = 'text-sm text-white'; p.textContent = 'Image shared for analysis';
            bubble.appendChild(img); bubble.appendChild(p);
            wrap.appendChild(bubble);
            messagesEl().appendChild(wrap);
            scrollMessages();
        }

        function showEscalationNotice() {
            const wrap = document.createElement('div');
            wrap.className = 'flex justify-center message-enter';
            const box = document.createElement('div');
            box.className = 'bg-red-50 border border-red-200 text-red-800 rounded-xl px-4 py-3 max-w-[90%] text-center';
            const t = document.createElement('p'); t.className = 'text-sm font-semibold'; t.textContent = 'You are being routed to in-person care.';
            box.appendChild(t);
            wrap.appendChild(box);
            messagesEl().appendChild(wrap);
            scrollMessages();
        }

        function showClinicCard(clinic) {
            const wrap = document.createElement('div');
            wrap.className = 'flex justify-center message-enter';
            const box = document.createElement('div');
            box.className = 'bg-blue-50 border border-blue-200 rounded-xl px-4 py-3 max-w-[90%] w-full';
            const name = document.createElement('p'); name.className = 'text-sm font-semibold text-aria-dark'; name.textContent = clinic.name || 'Recommended clinic';
            const loc = document.createElement('p'); loc.className = 'text-sm text-gray-700'; loc.textContent = clinic.location || '';
            box.appendChild(name);
            if (clinic.location) box.appendChild(loc);
            if (clinic.distance_km != null) {
                const dist = document.createElement('p'); dist.className = 'text-xs text-gray-500 mt-1';
                dist.textContent = 'About ' + clinic.distance_km + ' km away';
                box.appendChild(dist);
            }
            wrap.appendChild(box);
            messagesEl().appendChild(wrap);
            scrollMessages();
        }

        function showChatError(message) {
            const wrap = document.createElement('div');
            wrap.className = 'flex justify-center message-enter';
            const box = document.createElement('div');
            box.className = 'bg-amber-50 border border-amber-200 text-amber-800 rounded-xl px-4 py-2 max-w-[90%] text-center';
            const p = document.createElement('p'); p.className = 'text-sm'; p.textContent = message;
            box.appendChild(p);
            wrap.appendChild(box);
            messagesEl().appendChild(wrap);
            scrollMessages();
        }

        // Typing / processing indicator
        function showTyping() {
            if (document.getElementById('typingBubble')) return;
            const wrap = document.createElement('div');
            wrap.id = 'typingBubble';
            wrap.className = 'flex justify-start message-enter';
            const bubble = document.createElement('div');
            bubble.className = 'bg-white border border-gray-200 rounded-2xl rounded-bl-md px-4 py-3 shadow-sm';
            const p = document.createElement('p'); p.className = 'text-sm text-gray-400'; p.textContent = 'ARIA is typing…';
            bubble.appendChild(p);
            wrap.appendChild(bubble);
            messagesEl().appendChild(wrap);
            scrollMessages();
        }
        function removeTyping() {
            const t = document.getElementById('typingBubble');
            if (t) t.remove();
        }

        function setInputsEnabled(enabled) {
            const send = document.getElementById('chatSendBtn');
            const txt = document.getElementById('chatTextInput');
            const mic = document.getElementById('chatMicBtn');
            if (send) send.disabled = !enabled;
            if (txt) txt.disabled = !enabled;
            if (mic) mic.disabled = !enabled;
        }

        function playAudio(url) {
            try {
                const audio = new Audio(url);
                audio.play().catch(() => { /* autoplay/playback blocked: text reply already shown */ });
            } catch (e) { /* ignore: text reply already shown */ }
        }

        // === Render a /chat response ===
        function handleChatResponse(data, opts) {
            opts = opts || {};
            if (opts.showPatientText && data.patient_text) addChatMessage('patient', data.patient_text);
            if (data.reply) addChatMessage('aria', data.reply);
            if (data.escalated) showEscalationNotice();
            if (data.clinic) showClinicCard(data.clinic);
            if (data.audio_url) playAudio(data.audio_url);
            setStatus(data.escalated ? 'You are being routed to a clinic.' : 'Describe your symptoms or concern');
        }

        // === Run one turn: guards concurrency, shows processing, handles errors ===
        async function runTurn(work, opts) {
            opts = opts || {};
            if (isProcessing) return;
            isProcessing = true;
            setInputsEnabled(false);
            if (opts.patientText) addChatMessage('patient', opts.patientText);
            if (opts.patientImage) addImageMessage(opts.patientImage);
            showTyping();
            try {
                const data = await work();
                removeTyping();
                handleChatResponse(data, opts);
            } catch (err) {
                removeTyping();
                if (!err || err.message !== 'not-signed-in') {
                    showChatError((err && err.message) ? err.message : 'Something went wrong. Please try again.');
                }
            } finally {
                setInputsEnabled(true);
                isProcessing = false;
            }
        }

        function fileExt(file, fallback) {
            if (file && file.name && file.name.indexOf('.') !== -1) return file.name.split('.').pop().toLowerCase();
            if (file && file.type && file.type.indexOf('/') !== -1) return file.type.split('/')[1].toLowerCase();
            return fallback;
        }

        // === TEXT CHAT ===
        function sendChatMessage() {
            const input = document.getElementById('chatTextInput');
            const text = input.value.trim();
            if (!text || isProcessing) return;   // ignore empty/whitespace-only input
            input.value = '';
            runTurn(() => chatPost({ message: text }), { patientText: text });
        }

        // === IMAGE HANDLING ===
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            uploadedImage = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('imagePreview').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function clearImage() {
            uploadedImage = null;
            document.getElementById('imagePreview').classList.add('hidden');
            document.getElementById('imageFile').value = '';
        }

        function analyzeImage() {
            if (!uploadedImage || isProcessing) return;   // nothing selected -> no-op
            const file = uploadedImage;
            const imgSrc = document.getElementById('previewImg').src;
            const ext = fileExt(file, 'jpg');
            clearImage();
            runTurn(async () => {
                const up = await authedPost('/upload-url', { type: 'image', ext: ext });
                const put = await fetch(up.upload_url, {
                    method: 'PUT',
                    headers: { 'Content-Type': file.type || 'application/octet-stream' },
                    body: file,
                });
                if (!put.ok) throw new Error('Image upload failed (' + put.status + '). Please try again.');
                return chatPost({ image_key: up.key });
            }, { patientImage: imgSrc });
        }

        // === VOICE ===
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        async function startVoiceRecording() {
            if (isRecording || isProcessing) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                audioChunks = [];
                mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size) audioChunks.push(e.data); };
                mediaRecorder.start();
                isRecording = true;
                document.getElementById('chatMicBtn').classList.add('recording');
                setStatus('Listening...');
            } catch (err) {
                setStatus('Describe your symptoms or concern');
                showChatError('Microphone access is required to use voice. Please allow it and try again.');
            }
        }

        function stopVoiceRecording() {
            if (!isRecording || !mediaRecorder) return;
            isRecording = false;
            document.getElementById('chatMicBtn').classList.remove('recording');
            setStatus('Processing...');
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                try { mediaRecorder.stream.getTracks().forEach((t) => t.stop()); } catch (e) {}
                runTurn(async () => {
                    const up = await authedPost('/upload-url', { type: 'audio', ext: 'webm' });
                    const put = await fetch(up.upload_url, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'audio/webm' },
                        body: blob,
                    });
                    if (!put.ok) throw new Error('Audio upload failed (' + put.status + '). Please try again.');
                    return chatPost({ audio_key: up.key, speak: true });
                }, { showPatientText: true });
            };
            mediaRecorder.stop();
        }

        // === WIRE UP EVENTS ===
        window.addEventListener('DOMContentLoaded', () => {
            // Auth gate: resume an existing session, otherwise go to the login page.
            getIdToken().then(() => startConsultation()).catch(() => redirectToLogin());

            const sendBtn = document.getElementById('chatSendBtn');
            const textIn = document.getElementById('chatTextInput');
            sendBtn.addEventListener('click', sendChatMessage);
            textIn.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatMessage(); });

            const mic = document.getElementById('chatMicBtn');
            mic.addEventListener('mousedown', startVoiceRecording);
            mic.addEventListener('mouseup', stopVoiceRecording);
            mic.addEventListener('mouseleave', () => { if (isRecording) stopVoiceRecording(); });
            mic.addEventListener('touchstart', (e) => { e.preventDefault(); startVoiceRecording(); });
            mic.addEventListener('touchend', (e) => { e.preventDefault(); stopVoiceRecording(); });
        });
    </script>
</body>
</html>
