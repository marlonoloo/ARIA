<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA - Emergency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        aria: {
                            primary: '#0D9488',
                            secondary: '#F59E0B',
                            emergency: '#DC2626',
                            dark: '#1E293B',
                            light: '#F8FAFC',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }

        .mic-btn {
            transition: all 0.3s ease;
        }
        .mic-btn.recording {
            animation: pulse-ring 1.5s infinite;
        }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
            70% { box-shadow: 0 0 0 24px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .message-enter {
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 text-gray-600 hover:text-aria-dark">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
                <span class="text-sm font-medium">Back</span>
            </a>
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-aria-emergency rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                    </svg>
                </div>
                <span class="font-bold text-aria-dark">Emergency</span>
            </div>
            <div class="w-16"></div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col max-w-lg mx-auto w-full px-4 py-6">

        <!-- Status Banner -->
        <div id="statusBanner" class="bg-red-50 border border-red-200 rounded-xl p-4 mb-6 text-center">
            <p class="text-sm font-medium text-red-800" id="status">
                Tell ARIA what's happening. Hold the mic and speak.
            </p>
            <p class="text-xs text-red-600 mt-1">Speak in any language — ARIA understands</p>
        </div>

        <!-- Nearest clinic (populated from browser geolocation) -->
        <div id="clinicBanner" class="hidden bg-blue-50 border border-blue-200 rounded-xl p-3 mb-6 text-center">
            <p class="text-xs text-gray-500">Nearest clinic to you</p>
            <p class="text-sm font-semibold text-aria-dark" id="clinicName"></p>
            <p class="text-xs text-gray-600" id="clinicMeta"></p>
        </div>

        <!-- Conversation Area -->
        <div id="conversation" class="flex-1 flex flex-col space-y-0 overflow-y-auto mb-6 min-h-[200px]" style="display: none;">
        </div>

        <!-- Empty State (shown before first message) -->
        <div id="emptyState" class="flex-1 flex flex-col items-center justify-center text-center py-8">
            <div class="w-24 h-24 bg-red-50 rounded-full flex items-center justify-center mb-4">
                <svg class="w-12 h-12 text-aria-emergency" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" />
                </svg>
            </div>
            <p class="text-gray-500 text-sm max-w-xs">
                Press and hold the red button below to describe your emergency
            </p>
        </div>

        <!-- Mic Button Area -->
        <div class="flex flex-col items-center gap-4 pb-4">
            
            <!-- Mic Button -->
            <button class="mic-btn w-24 h-24 rounded-full bg-aria-emergency flex items-center justify-center shadow-lg hover:bg-red-700 active:scale-95 focus:outline-none focus:ring-4 focus:ring-red-200" 
                    id="micBtn" 
                    aria-label="Hold to speak">
                <svg class="w-10 h-10 text-white" id="micIcon" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>
            <p class="text-xs text-gray-500" id="micLabel">Hold to speak</p>

            <!-- Text Input (secondary option) -->
            <div class="w-full flex gap-2 mt-2">
                <input type="text" 
                       id="textInput" 
                       class="flex-1 px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-aria-primary focus:border-transparent"
                       placeholder="Or type here..."
                       aria-label="Type your message">
                <button id="sendBtn" 
                        class="px-4 py-3 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700 active:scale-95">
                    Send
                </button>
            </div>
        </div>

    </main>

    <!-- AWS SDK for Polly -->
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1692.0.min.js"></script>
    <!-- Clinic locator (geolocation + public /nearest-clinic) -->
    <script src="clinic-locator.js"></script>
    <script src="app.js"></script>
    <script>
        // Proactively find the nearest clinic for the emergency. Additive — does
        // not change app.js; just surfaces a clinic banner once located.
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const clinic = await findNearestClinic();
                if (clinic) {
                    document.getElementById('clinicName').textContent = clinic.name;
                    document.getElementById('clinicMeta').textContent =
                        `${clinic.location} · about ${clinic.distance_km} km away`;
                    document.getElementById('clinicBanner').classList.remove('hidden');
                }
            } catch (e) {
                // Location denied/unsupported/timed out — leave the banner hidden;
                // the emergency flow in app.js continues unaffected.
                console.warn('Nearest-clinic lookup skipped:', e && e.message);
            }
        });
    </script>
</body>
</html>
