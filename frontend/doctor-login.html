<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>ARIA - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        aria: {
                            blue: '#2563EB',
                            dark: '#1E40AF',
                            light: '#EFF6FF',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-sm">
        <!-- Logo & Branding -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-aria-blue rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="text-3xl">🏥</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">ARIA</h1>
            <p class="text-sm text-gray-500 mt-1">Mothobi Healthcare Group</p>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm">
            <h2 class="text-lg font-semibold text-gray-900 mb-1">Sign in</h2>
            <p class="text-sm text-gray-500 mb-6">Access the clinician dashboard</p>

            <!-- Error message -->
            <div id="errorMsg" class="hidden bg-red-50 border border-red-200 rounded-lg p-3 mb-4">
                <p class="text-sm text-red-700" id="errorText"></p>
            </div>

            <form onsubmit="handleLogin(event)">
                <div class="space-y-4">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <input type="text" id="email" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-aria-blue focus:border-transparent"
                               placeholder="Enter your username">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="password" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-aria-blue focus:border-transparent"
                               placeholder="Enter your password">
                    </div>
                </div>

                <button type="submit" id="loginBtn"
                        class="w-full mt-6 py-3 bg-aria-blue text-white rounded-xl text-sm font-semibold hover:bg-aria-dark active:scale-[0.98] transition-transform">
                    Sign In
                </button>
            </form>

            <div class="mt-4 text-center">
                <button onclick="showSignUp()" class="text-sm text-aria-blue hover:underline">
                    Don't have an account? Sign up
                </button>
            </div>
        </div>

        <!-- Sign Up Form (hidden initially) -->
        <div id="signUpForm" class="hidden bg-white border border-gray-200 rounded-2xl p-6 shadow-sm">
            <h2 class="text-lg font-semibold text-gray-900 mb-1">Create account</h2>
            <p class="text-sm text-gray-500 mb-6">Register as a clinician</p>

            <!-- Error message -->
            <div id="signUpErrorMsg" class="hidden bg-red-50 border border-red-200 rounded-lg p-3 mb-4">
                <p class="text-sm text-red-700" id="signUpErrorText"></p>
            </div>

            <form onsubmit="handleSignUp(event)">
                <div class="space-y-4">
                    <div>
                        <label for="signUpName" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                        <input type="text" id="signUpName" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-aria-blue focus:border-transparent"
                               placeholder="Dr. Amina Hassan">
                    </div>
                    <div>
                        <label for="signUpEmail" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="signUpEmail" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-aria-blue focus:border-transparent"
                               placeholder="doctor@mothobi.health">
                    </div>
                    <div>
                        <label for="signUpPassword" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="signUpPassword" required minlength="8"
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-aria-blue focus:border-transparent"
                               placeholder="Min 8 characters">
                    </div>
                </div>

                <button type="submit" id="signUpBtn"
                        class="w-full mt-6 py-3 bg-aria-blue text-white rounded-xl text-sm font-semibold hover:bg-aria-dark active:scale-[0.98] transition-transform">
                    Create Account
                </button>
            </form>

            <div class="mt-4 text-center">
                <button onclick="showLogin()" class="text-sm text-aria-blue hover:underline">
                    Already have an account? Sign in
                </button>
            </div>
        </div>

        <!-- Confirmation Form (hidden, shown after sign up) -->
        <div id="confirmForm" class="hidden bg-white border border-gray-200 rounded-2xl p-6 shadow-sm">
            <h2 class="text-lg font-semibold text-gray-900 mb-1">Verify your email</h2>
            <p class="text-sm text-gray-500 mb-6">We sent a code to your email. Enter it below.</p>

            <form onsubmit="handleConfirm(event)">
                <div>
                    <label for="confirmCode" class="block text-sm font-medium text-gray-700 mb-1">Verification Code</label>
                    <input type="text" id="confirmCode" required
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-center tracking-widest text-lg focus:outline-none focus:ring-2 focus:ring-aria-blue focus:border-transparent"
                           placeholder="123456">
                </div>

                <button type="submit"
                        class="w-full mt-6 py-3 bg-aria-blue text-white rounded-xl text-sm font-semibold hover:bg-aria-dark active:scale-[0.98] transition-transform">
                    Verify & Sign In
                </button>
            </form>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-gray-400 mt-6">
            Clinician access only. Patient services do not require login.
        </p>
    </div>

    <script src="auth.js"></script>
</body>
</html>
